# Server configuration
server.port=8080

# H2 Database configuration (Default for zero-config run)
spring.datasource.url=jdbc:h2:mem:flowbrixdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Allow frames for H2 Console UI
spring.headers.frame-options=disable

# JPA & Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging configurations
logging.level.org.springframework.web=INFO
logging.level.com.flowbrix.onboarding=DEBUG
